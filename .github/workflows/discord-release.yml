name: Backfill Discord release announcement

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing public release tag to announce
        required: true
        type: string

permissions:
  contents: write

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Post release notes to Discord if not already announced
        env:
          GH_TOKEN: ${{ github.token }}
          DISCORD_RELEASE_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
        run: python3 scripts/post_discord_release.py --tag "${{ inputs.tag }}"
