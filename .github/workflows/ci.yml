name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality Guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          key: quality-ubuntu
          cache-all-crates: "true"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check all targets and all features
        run: cargo check --all-targets --all-features

      - name: Run clippy with warnings denied
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Enforce no unused dependencies
        shell: bash
        run: |
          cargo install cargo-machete --locked
          cargo machete

  macos-build-test:
    name: Build & Test (macos-latest)
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      # Pin the workflow's stable toolchain even when a dependency contains its
      # own rust-toolchain.toml file.
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-latest-stablepin

      - name: Build
        shell: bash
        run: |
          export RUSTC="$(rustup which rustc)"
          "$(rustup which cargo)" build --release --target aarch64-apple-darwin

      - name: Compile library and binary tests
        shell: bash
        run: |
          python3 .github/scripts/run_with_timeout.py 900 \
            "$(rustup which cargo)" test --target aarch64-apple-darwin \
            --lib --bins --no-run

      - name: Run deterministic retention-readiness cohort
        shell: bash
        run: |
          python3 .github/scripts/run_with_timeout.py 600 \
            "$(rustup which cargo)" test --target aarch64-apple-darwin \
            -p daanio-app-core --lib retention_readiness -- --nocapture

      - name: Compile integration test binaries
        shell: bash
        run: |
          python3 .github/scripts/run_with_timeout.py 900 \
            "$(rustup which cargo)" test --target aarch64-apple-darwin \
            --test provider_matrix --test e2e --no-run

      - name: Run provider matrix tests
        shell: bash
        run: |
          python3 .github/scripts/run_with_timeout.py 600 \
            "$(rustup which cargo)" test --target aarch64-apple-darwin \
            --test provider_matrix

      - name: Run e2e tests
        shell: bash
        run: |
          python3 .github/scripts/run_with_timeout.py 600 \
            "$(rustup which cargo)" test --target aarch64-apple-darwin \
            --test e2e
