name: DaanioMobile
options:
  bundleIdPrefix: com.daanio
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  DaanioKit:
    path: .

targets:
  DaanioMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources/DaanioMobile
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Sources/DaanioMobile/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.daanio.mobile
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: TAS6ARKDN7
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: DaanioKit
        product: DaanioKit
